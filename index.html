<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عُبور — حجز مواعيد الشاحنات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#0f4c81;--primary-dark:#0a3560;--accent:#10b981;--accent-soft:#d1fae5;
    --bg-1:#f0f5fb;--bg-2:#e2ecf7;--ink:#12263f;--muted:#64748b;--line:#cbd8e8;
    --white:#fff;--danger:#ef4444;--shadow:0 20px 45px -20px rgba(15,76,129,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,var(--bg-1),var(--bg-2));min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:560px;background:var(--white);border-radius:24px;
    box-shadow:var(--shadow);padding:38px 32px}
  .brand{display:flex;align-items:center;gap:12px;justify-content:center}
  .brand-badge{width:46px;height:46px;border-radius:14px;
    background:linear-gradient(135deg,var(--primary),#1c6fb8);display:flex;
    align-items:center;justify-content:center;box-shadow:0 8px 18px -8px rgba(15,76,129,.6)}
  .brand-badge svg{width:26px;height:26px;fill:#fff}
  .brand-name{font-weight:800;font-size:1.15rem;color:var(--primary)}
  h1{font-size:1.5rem;font-weight:800;text-align:center;margin-top:14px}
  .sub{text-align:center;color:var(--muted);font-size:.98rem;margin:8px 0 26px;line-height:1.7}

  .dropzone{position:relative;border:2px dashed var(--line);border-radius:18px;
    background:#f8fbff;padding:44px 20px;text-align:center;cursor:pointer;transition:all .25s}
  .dropzone:hover{border-color:var(--primary);background:#f2f8ff}
  .dropzone.dragover{border-color:var(--accent);background:var(--accent-soft);transform:scale(1.01)}
  .dz-icon{width:64px;height:64px;margin:0 auto 15px;border-radius:50%;
    background:linear-gradient(135deg,#e8f1fb,#d6e8fa);display:flex;align-items:center;justify-content:center}
  .dz-icon svg{width:31px;height:31px;fill:var(--primary)}
  .dz-title{font-weight:700;font-size:1.05rem}
  .dz-hint{color:var(--muted);font-size:.88rem;margin-top:6px}
  .dz-or{display:inline-block;margin-top:14px;background:var(--primary);color:#fff;
    padding:9px 22px;border-radius:10px;font-weight:700;font-size:.9rem}
  .dropzone:hover .dz-or{background:var(--primary-dark)}

  .file-card{display:none;align-items:center;gap:14px;margin-top:18px;padding:15px 17px;
    border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#f8fbff);animation:pop .3s}
  .file-card.show{display:flex}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .file-type{flex-shrink:0;width:48px;height:56px;border-radius:9px;
    background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-weight:800;font-size:.7rem;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;
    box-shadow:0 8px 16px -8px rgba(220,38,38,.6)}
  .file-meta{flex:1;min-width:0;text-align:right}
  .file-name{font-weight:700;font-size:.95rem;word-break:break-word;line-height:1.4}
  .file-size{color:var(--muted);font-size:.83rem;margin-top:3px}
  .remove-btn{flex-shrink:0;width:34px;height:34px;border:none;cursor:pointer;border-radius:9px;
    background:#fee2e2;color:var(--danger);font-size:1.3rem;line-height:1;transition:all .2s}
  .remove-btn:hover{background:var(--danger);color:#fff}

  .title-panel{display:none;margin-top:16px;padding:22px;border-radius:16px;
    background:linear-gradient(135deg,#f1f7fd,#eaf3fb);border:1px solid var(--line);
    text-align:center;animation:pop .35s}
  .title-panel.show{display:block}
  .tp-label{display:inline-flex;align-items:center;gap:7px;color:var(--primary);
    font-weight:700;font-size:.86rem}
  .tp-label .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft)}
  .tp-title{font-size:1.55rem;font-weight:800;color:var(--ink);margin-top:12px;
    word-break:break-word;line-height:1.4}

  footer{text-align:center;color:var(--muted);font-size:.82rem;margin-top:26px}
  footer b{color:var(--primary)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-badge">
        <svg viewBox="0 0 24 24"><path d="M3 4a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h1a2.5 2.5 0 0 0 5 0h4a2.5 2.5 0 0 0 5 0h1a1 1 0 0 0 1-1v-3.5a1 1 0 0 0-.3-.7l-3-3a1 1 0 0 0-.7-.3H16V5a1 1 0 0 0-1-1H3Zm13 5h1.6l2.4 2.4V13h-4V9ZM6.5 15.5A1 1 0 1 1 6.5 17a1 1 0 0 1 0-1.5Zm9 0A1 1 0 1 1 15.5 17a1 1 0 0 1 0-1.5Z"/></svg>
      </div>
      <span class="brand-name">عُبور</span>
    </div>
    <h1>رفع بيانات السائقين</h1>
    <p class="sub">اسحب ملف بيانات السائقين (PDF) وأفلته هنا لبدء عملية الحجز الآلي في المنافذ البرية</p>

    <div class="dropzone" id="dropzone" role="button" tabindex="0">
      <input type="file" id="fileInput" accept=".pdf,application/pdf,image/*" hidden>
      <div class="dz-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 0 1 .7.3l4 4a1 1 0 0 1-1.4 1.4L13 6.4V15a1 1 0 1 1-2 0V6.4L8.7 8.7a1 1 0 0 1-1.4-1.4l4-4A1 1 0 0 1 12 3ZM5 15a1 1 0 0 1 1 1v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2a1 1 0 1 1 2 0v2a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-2a1 1 0 0 1 1-1Z"/></svg>
      </div>
      <div class="dz-title">اسحب الملف هنا</div>
      <div class="dz-hint">صيغة PDF — بيانات السائقين</div>
      <span class="dz-or">أو اختر ملف</span>
    </div>

    <div class="title-panel" id="titlePanel">
      <span class="tp-label"><span class="dot"></span> عنوان المستند</span>
      <div class="tp-title" id="docTitle"></div>
    </div>

    <div class="file-card" id="fileCard">
      <div class="file-type" id="fileType">PDF</div>
      <div class="file-meta">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <button class="remove-btn" id="removeBtn">&times;</button>
    </div>

    <footer>مدعوم بـ <b>الحجز الآلي</b> — منصة عُبور</footer>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const dropzone=$('dropzone'), fileInput=$('fileInput'), fileCard=$('fileCard'),
    fileName=$('fileName'), fileSize=$('fileSize'), fileType=$('fileType'),
    removeBtn=$('removeBtn'), titlePanel=$('titlePanel'), docTitle=$('docTitle');

  const fmtSize=b=>b<1024?b+' بايت':b<1048576?(b/1024).toFixed(1)+' كيلوبايت':(b/1048576).toFixed(1)+' ميجابايت';

  // تحويل اسم الملف إلى عنوان نظيف: شيل الامتداد + الشرطات → مسافات
  function prettify(name){
    return name.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').replace(/\s+/g,' ').trim();
  }

  function showFile(file){
    docTitle.textContent = prettify(file.name);       // ← العنوان المنسّق
    fileName.textContent = file.name;                  // الاسم الأصلي
    fileSize.textContent = fmtSize(file.size);
    fileType.textContent = (file.name.split('.').pop()||'FILE').toUpperCase().slice(0,4);
    titlePanel.classList.add('show');
    fileCard.classList.add('show');
    dropzone.style.display='none';
  }
  function reset(){
    fileInput.value='';
    titlePanel.classList.remove('show');
    fileCard.classList.remove('show');
    dropzone.style.display='block';
  }

  dropzone.addEventListener('click',()=>fileInput.click());
  dropzone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')fileInput.click();});
  fileInput.addEventListener('change',e=>{if(e.target.files.length)showFile(e.target.files[0]);});
  ['dragenter','dragover'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();dropzone.classList.add('dragover');}));
  ['dragleave','drop'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();dropzone.classList.remove('dragover');}));
  dropzone.addEventListener('drop',e=>{if(e.dataTransfer.files.length)showFile(e.dataTransfer.files[0]);});
  removeBtn.addEventListener('click',reset);
</script>
</body>
</html>
